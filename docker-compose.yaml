version: '3.8'

# ================================
# 版本变量定义（统一管理，方便迭代更新）
# ================================
x-image-version: &image-version
  QUALITY_AGENT_VERSION: "1.0.0"

services:
  # ================================
  # 质量管理 AI Agent 服务
  # ================================
  quality-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: quality-agent:${QUALITY_AGENT_VERSION:-1.0.0}
    container_name: quality-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      # 日志持久化 - 映射到宿主机目录
      - /home/agentdata/quality-agent/logs:/app/logs
      # Skill 文件持久化 - Agent 自动更新的 Skill 不会因容器重启丢失
      - /home/agentdata/quality-agent/skills:/app/skills
      # 知识库持久化 - 基线标准、历史案例等持续积累
      - /home/agentdata/quality-agent/knowledge:/app/knowledge
      # 用户画像持久化
      - /home/agentdata/quality-agent/user_profiles:/app/user_profiles
    networks:
      - quality-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/agent/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  quality-net:
    driver: bridge
